workspace_root: .

# ---------------------------------------------------------------------------
# ForgeQL verify steps — used by the VERIFY build command.
#
# Steps are granular so the fql_kind migration can target exactly the
# affected test suite without waiting for the full workspace to rebuild.
#
# Suggested execution order for a full run:
#   build -> test-engine -> test-syntax -> test-enrichment -> test-sms
#          -> test-change -> test-multilang -> test-lang-coverage -> test
# ---------------------------------------------------------------------------
verify_steps:

  # -- compilation only (fastest feedback) --
  - name: build
    command: "cargo build --workspace"
    timeout_secs: 120

  # Core query engine: FIND symbols, FIND usages, SHOW body/outline/members,
  # clause pipeline, GROUP BY, ORDER BY, LIMIT, OFFSET.
  - name: test-engine
    command: "cargo test -p forgeql-core --test engine_integration"
    timeout_secs: 120

  # Syntax coverage: every node_kind / fql_kind value cross-checked against
  # the C++ fixture (motor_control.h). Main target for fql_kind migration.
  - name: test-syntax
    command: "cargo test -p forgeql-core --test syntax_coverage"
    timeout_secs: 120

  # Enrichment: all enricher fields (metrics, control-flow, operators, casts,
  # shadow, escape, unused-param, fallthrough, recursion, todo, decl-distance).
  - name: test-enrichment
    command: "cargo test -p forgeql-core --test enrichment_integration"
    timeout_secs: 180

  # SMS (State Model Search): combinatorial clause-pipeline invariant checks.
  - name: test-sms
    command: "cargo test -p forgeql-core --test sms_integration"
    timeout_secs: 180

  # CHANGE / CHANGE FILES / transaction mutations.
  - name: test-change
    command: "cargo test -p forgeql-core --test change_integration"
    timeout_secs: 60

  # Cross-language symbol resolution (C++ + Rust ambiguity handling).
  - name: test-multilang
    command: "cargo test -p forgeql-core --test multilang_resolve_integration"
    timeout_secs: 60

  # Language plugin coverage: Rust + C++ fql_kind mapping completeness.
  - name: test-lang-coverage
    command: "cargo test -p forgeql-core --test lang_coverage_integration"
    timeout_secs: 60

  # -- full workspace --
  # All unit tests + all integration tests across every crate.
  - name: test
    command: "cargo test --workspace"
    timeout_secs: 300

  # Lint check -- run after passing tests to catch style regressions.
  - name: clippy
    command: "cargo clippy --workspace -- -D warnings"
    timeout_secs: 120

  # Build release binary, install it, then schedule a server restart.
  # The 5-second delay lets VERIFY return its output before the process exits.
  # VS Code auto-restarts MCP servers that exit -- reconnect after ~5 seconds.
  - name: build-and-restart
    command: "cargo build --release && { (sleep 5 && pkill -f 'forgeql --mcp') & echo 'Binary built. Server restarting in 5 seconds -- reconnect with USE.'; }"
    timeout_secs: 180    